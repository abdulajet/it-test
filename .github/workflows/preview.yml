name: Preview Tutorial

on:
  pull_request:
    branches: [ "main" ]
    types:
      - labeled

jobs:
  deploy-preview:
    if: github.event.label.name == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
